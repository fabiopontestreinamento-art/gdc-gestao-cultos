<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GDC – Gestão de Cultos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0B1D3A;--navy2:#162D55;--navy3:#1E3F6F;
  --red:#C0392B;--red2:#E74C3C;--red3:#FDECEA;
  --gold:#D4A843;
  --white:#FFFFFF;--off:#F7F8FC;--g1:#E8EBF2;--g2:#B0BAC9;--g3:#6B7A8D;
  --font:'Outfit',sans-serif;--r:14px;--r2:10px;
  --shadow:0 4px 20px rgba(11,29,58,0.10);
}
html,body{height:100%;font-family:var(--font);background:var(--off);color:var(--navy);overflow:hidden}
#app{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative;overflow:hidden;background:var(--off)}
.screen{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;display:none;flex-direction:column;background:var(--off)}
.page.active{display:flex}
.content{padding:16px;display:flex;flex-direction:column;gap:14px;padding-bottom:80px}
.status-area{height:env(safe-area-inset-top,0px);background:var(--navy)}
.header{background:var(--navy);padding:14px 18px 12px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.header h2{font-size:17px;font-weight:600;color:var(--white)}
.header .sub{font-size:11px;color:rgba(255,255,255,0.5);margin-top:1px}
.back{color:rgba(255,255,255,0.75);cursor:pointer;font-size:22px;padding:2px 8px 2px 0;line-height:1}
.hdr-left{display:flex;align-items:center}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--white);cursor:pointer;flex-shrink:0}
.bnav{background:var(--navy);display:flex;justify-content:space-around;align-items:center;padding:8px 0 max(16px,env(safe-area-inset-bottom,16px));flex-shrink:0;border-top:1px solid rgba(255,255,255,0.08);display:none}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:5px 10px;border-radius:10px;position:relative}
.ni .ic{font-size:20px;line-height:1}
.ni .lb{font-size:10px;font-weight:500;color:rgba(255,255,255,0.45)}
.ni.active .lb{color:var(--red)}
.ni .bdot{position:absolute;top:2px;right:6px;width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid var(--navy)}
#login{background:linear-gradient(160deg,var(--navy) 0%,var(--navy2) 55%,var(--navy3) 100%);justify-content:center;padding:32px 24px;display:flex}
.l-logo{text-align:center;margin-bottom:36px}
.l-logo .cross{font-size:44px;display:block;color:var(--gold);margin-bottom:8px}
.l-logo h1{font-size:30px;font-weight:700;color:var(--white);letter-spacing:-0.5px}
.l-logo p{font-size:13px;color:rgba(255,255,255,0.5);margin-top:4px}
.l-card{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.13);border-radius:20px;padding:26px 22px}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:11px;font-weight:600;color:rgba(255,255,255,0.55);margin-bottom:7px;letter-spacing:0.6px;text-transform:uppercase}
.fi{width:100%;background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.16);border-radius:10px;padding:13px 15px;font-size:15px;color:var(--white);font-family:var(--font);outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--gold)}
.fi::placeholder{color:rgba(255,255,255,0.3)}
.btn-p{width:100%;background:var(--red);color:var(--white);border:none;border-radius:12px;padding:15px;font-size:16px;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .2s}
.btn-p:active{transform:scale(0.97)}
.btn-s{background:transparent;color:var(--white);border:1.5px solid rgba(255,255,255,0.25);border-radius:12px;padding:12px 18px;font-size:14px;font-weight:500;font-family:var(--font);cursor:pointer}
.card{background:var(--white);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);border:1px solid var(--g1)}
.sec-title{font-size:12px;font-weight:600;color:var(--g3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--g1)}
.fl{font-size:12px;font-weight:600;color:var(--g3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.finp{width:100%;background:var(--off);border:1.5px solid var(--g1);border-radius:10px;padding:11px 13px;font-size:14px;color:var(--navy);font-family:var(--font);outline:none;transition:border-color .2s;appearance:none}
.finp:focus{border-color:var(--navy2)}
.finp::placeholder{color:var(--g2)}
.step-bar{display:flex;gap:5px}
.step{flex:1;height:4px;border-radius:4px;background:var(--g1);transition:background .3s}
.step.done{background:var(--red)}
.step.cur{background:var(--navy)}
.step-lbl{font-size:12px;color:var(--g3);margin-bottom:14px;margin-top:4px}
.lv-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--g1)}
.lv-item:last-child{border-bottom:none}
.chk{width:22px;height:22px;border-radius:6px;border:2px solid var(--g2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.chk.on{background:var(--navy);border-color:var(--navy)}
.chk.on::after{content:'✓';color:var(--white);font-size:12px;font-weight:700}
.lv-name{font-size:14px;font-weight:500;color:var(--navy)}
.btn-row{display:flex;gap:10px}
.btn-o{flex:1;background:transparent;border:1.5px solid var(--navy);color:var(--navy);border-radius:12px;padding:13px;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .2s}
.btn-r{flex:1;background:var(--red);border:none;color:var(--white);border-radius:12px;padding:13px;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .2s}
.btn-r:active{transform:scale(0.97);background:var(--red2)}
.btn-full{width:100%;background:var(--red);border:none;color:var(--white);border-radius:12px;padding:14px;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-90px);z-index:1000;background:var(--navy);color:var(--white);border-radius:12px;padding:12px 18px;display:flex;align-items:center;gap:9px;box-shadow:0 8px 24px rgba(0,0,0,.25);font-size:13px;font-weight:500;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:90vw}
.toast.on{transform:translateX(-50%) translateY(0)}
.tdot{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:900;display:none;align-items:flex-end}
.modal-bg.on{display:flex}
.modal{background:var(--white);border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%}
.modal h3{font-size:17px;font-weight:700;margin-bottom:18px}
#loading{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px}
#loading .cross{font-size:56px;color:var(--gold)}
#loading p{color:rgba(255,255,255,.6);font-size:14px}
.spin{width:32px;height:32px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="loading">
  <div class="cross">✝</div>
  <div class="spin"></div>
  <p>Carregando GDC...</p>
</div>
<div id="app">
  <div class="toast" id="toast"><div class="tdot"></div><span id="tmsg">Salvo!</span></div>
  <div class="screen" id="screen">
    <div class="page active" id="pg-login" style="display:flex">
      <div class="l-logo">
        <span class="cross">✝</span>
        <h1>GDC</h1>
        <p>Gestão de Cultos</p>
      </div>
      <div class="l-card">
        <div class="fg">
          <label>Telefone</label>
          <input class="fi" type="tel" id="inp-tel" placeholder="(83) 99999-9999">
        </div>
        <div class="fg">
          <label>Senha</label>
          <input class="fi" type="password" id="inp-senha" placeholder="••••••••">
        </div>
        <button class="btn-p" onclick="doLogin()">Entrar</button>
        <p style="text-align:center;margin-top:14px;font-size:12px;color:rgba(255,255,255,.4)">Acesso exclusivo para liderança cadastrada</p>
      </div>
    </div>
  </div>
  <div class="bnav" id="bnav"></div>
</div>
<script>
const SUPA_URL = 'https://ikyhahqhefdpgyhlentg.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlreWhhaHFoZWZkcGd5aGxlbnRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyODE0NjEsImV4cCI6MjA5MDg1NzQ2MX0.wudFxDvHe8Np7SRZNF3QDal8-aa-SfmQNVYYT2-izOM';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);
let currentUser = null;
window.addEventListener('load', async ()=>{
  try {
    const {data:{session}} = await sb.auth.getSession();
    if(session){ currentUser = session.user; }
  } catch(e){}
  document.getElementById('loading').style.display='none';
});
async function doLogin(){
  const tel = document.getElementById('inp-tel').value.trim().replace(/\D/g,'');
  const senha = document.getElementById('inp-senha').value;
  if(!tel||!senha){showToast('Preencha telefone e senha');return;}
  const email = tel+'@gdc.app';
  showToast('Entrando...');
  const {data, error} = await sb.auth.signInWithPassword({email, password: senha});
  if(error){showToast('Telefone ou senha incorretos');return;}
  currentUser = data.user;
  showToast('Login realizado!');
}
let toastTimer;
function showToast(msg){
  clearTimeout(toastTimer);
  document.getElementById('tmsg').textContent=msg;
  const t=document.getElementById('toast');
  t.classList.add('on');
  toastTimer=setTimeout(()=>t.classList.remove('on'),3000);
}
</script>
</body>
</html>
